    <rect x="18" y="48" width="44" height="8" rx="4" fill="#a78bfa" opacity="0.9"/>
    <rect x="68" y="48" width="80" height="8" rx="4" fill="#c4b5fd" opacity="0.6"/>
    <rect x="18" y="68" width="32" height="8" rx="4" fill="#a78bfa" opacity="0.9"/>
    <rect x="56" y="68" width="96" height="8" rx="4" fill="#c4b5fd" opacity="0.6"/>
    <rect x="158" y="68" width="48" height="8" rx="4" fill="#22d3ee" opacity="0.7"/>
    <rect x="18" y="88" width="60" height="8" rx="4" fill="#6b7280" opacity="0.5"/>
