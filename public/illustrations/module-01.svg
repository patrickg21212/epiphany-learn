<svg viewBox="0 0 480 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="m1bg" x1="0" y1="0" x2="480" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="m1accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="480" height="320" rx="24" fill="url(#m1bg)"/>

  <!-- Brain outline -->
  <g transform="translate(240,145)" stroke="url(#m1accent)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left hemisphere -->
    <path d="M-8,-52 C-28,-52 -48,-40 -52,-20 C-56,0 -48,16 -38,26 C-32,32 -36,44 -28,50 C-20,56 -8,52 -4,46"/>
    <!-- Right hemisphere -->
    <path d="M8,-52 C28,-52 48,-40 52,-20 C56,0 48,16 38,26 C32,32 36,44 28,50 C20,56 8,52 4,46"/>
    <!-- Center line -->
    <path d="M0,-52 L0,46" stroke-dasharray="4,4" opacity="0.4"/>
    <!-- Neural connections -->
    <circle cx="-20" cy="-20" r="4" fill="#3b82f6" opacity="0.6"/>
    <circle cx="20" cy="-20" r="4" fill="#3b82f6" opacity="0.6"/>
    <circle cx="-16" cy="10" r="4" fill="#3b82f6" opacity="0.6"/>
    <circle cx="16" cy="10" r="4" fill="#3b82f6" opacity="0.6"/>
    <circle cx="0" cy="-8" r="5" fill="#3b82f6" opacity="0.8"/>
    <line x1="-20" y1="-20" x2="0" y2="-8" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
    <line x1="20" y1="-20" x2="0" y2="-8" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
    <line x1="-16" y1="10" x2="0" y2="-8" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
    <line x1="16" y1="10" x2="0" y2="-8" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Lightbulb glow -->
  <circle cx="240" cy="140" r="72" fill="#3b82f6" opacity="0.06"/>
  <circle cx="240" cy="140" r="90" fill="#3b82f6" opacity="0.03"/>

  <!-- Floating elements -->
  <rect x="60" y="60" width="56" height="56" rx="14" fill="white" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="88" y="95" font-size="24" text-anchor="middle" font-family="system-ui">🤖</text>

  <rect x="364" y="50" width="56" height="56" rx="14" fill="white" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="392" y="85" font-size="24" text-anchor="middle" font-family="system-ui">💡</text>

  <rect x="50" y="210" width="56" height="56" rx="14" fill="white" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="78" y="245" font-size="24" text-anchor="middle" font-family="system-ui">📊</text>

  <rect x="374" y="220" width="56" height="56" rx="14" fill="white" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="402" y="255" font-size="24" text-anchor="middle" font-family="system-ui">⚡</text>

  <!-- Connection dots -->
  <line x1="116" y1="88" x2="182" y2="120" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="364" y1="78" x2="298" y2="115" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4,4"/>
