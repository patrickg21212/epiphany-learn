<svg viewBox="0 0 480 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="m3bg" x1="0" y1="0" x2="480" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
  </defs>
  <rect width="480" height="320" rx="24" fill="url(#m3bg)"/>
  <!-- Calendar -->
  <g transform="translate(130,30)">
    <rect width="220" height="190" rx="16" fill="white" stroke="#bbf7d0" stroke-width="2"/>
    <!-- Header -->
    <rect width="220" height="40" rx="16" fill="#22c55e"/>
    <rect y="16" width="220" height="24" fill="#22c55e"/>
    <text x="110" y="32" font-size="14" fill="white" text-anchor="middle" font-family="system-ui" font-weight="700">March 2026</text>
    <!-- Day headers -->
    <g font-size="10" fill="#9ca3af" font-family="system-ui" text-anchor="middle">
      <text x="30" y="62">M</text><text x="62" y="62">T</text><text x="94" y="62">W</text>
      <text x="126" y="62">T</text><text x="158" y="62">F</text><text x="190" y="62">S</text>
    </g>
    <!-- Days grid -->
    <g font-size="12" fill="#374151" font-family="system-ui" text-anchor="middle">
      <text x="30" y="84">3</text><text x="62" y="84">4</text><text x="94" y="84">5</text>
      <text x="126" y="84">6</text><text x="158" y="84">7</text><text x="190" y="84">8</text>
      <text x="30" y="108">10</text><text x="62" y="108">11</text>
      <text x="126" y="108">13</text><text x="158" y="108">14</text><text x="190" y="108">15</text>
      <text x="30" y="132">17</text><text x="62" y="132">18</text><text x="94" y="132">19</text>
    </g>
    <!-- Highlighted today -->
    <circle cx="94" cy="104" r="14" fill="#22c55e" opacity="0.15"/>
    <text x="94" y="108" font-size="12" fill="#16a34a" font-family="system-ui" text-anchor="middle" font-weight="700">12</text>
    <!-- AI scheduled event -->
    <rect x="10" y="148" width="200" height="28" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
    <text x="22" y="166" font-size="10" fill="#16a34a" font-family="system-ui" font-weight="500">🤖 3 meetings auto-scheduled</text>
  </g>
  <!-- Clock overlay -->
  <g transform="translate(60,130)">
    <circle cx="40" cy="40" r="40" fill="white" stroke="#bbf7d0" stroke-width="2.5"/>
    <circle cx="40" cy="40" r="3" fill="#22c55e"/>
    <line x1="40" y1="40" x2="40" y2="18" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="40" x2="58" y2="32" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Chat bubble -->
  <g transform="translate(370,115)">
    <rect width="90" height="60" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="12" y="22" font-size="9" fill="#374151" font-family="system-ui" font-weight="600">AI says:</text>
    <text x="12" y="38" font-size="8" fill="#6b7280" font-family="system-ui">"Your 2pm is</text>
    <text x="12" y="50" font-size="8" fill="#6b7280" font-family="system-ui">rescheduled ✓"</text>
  </g>
  <!-- Label -->
  <rect x="150" y="260" width="180" height="36" rx="18" fill="#22c55e"/>
  <text x="240" y="283" font-size="13" fill="white" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600">AI in Your Day</text>
</svg>
