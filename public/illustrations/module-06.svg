<svg viewBox="0 0 480 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="m6bg" x1="0" y1="0" x2="480" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
    <linearGradient id="m6flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="60%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="480" height="320" rx="24" fill="url(#m6bg)"/>

  <!-- Rocket -->
  <g transform="translate(240,135)">
    <path d="M-12,52 C-12,52 -6,74 0,80 C6,74 12,52 12,52" fill="url(#m6flame)" opacity="0.8"/>
    <path d="M-8,52 C-8,52 -3,68 0,72 C3,68 8,52 8,52" fill="#fbbf24" opacity="0.6"/>
    <path d="M-16,52 L-16,0 C-16,-24 0,-52 0,-60 C0,-52 16,-24 16,0 L16,52 Z" fill="white" stroke="#ec4899" stroke-width="2"/>
    <circle cx="0" cy="-10" r="10" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.5"/>
    <circle cx="0" cy="-10" r="6" fill="#ec4899" opacity="0.2"/>
    <path d="M-16,36 L-28,52 L-16,52 Z" fill="#ec4899" opacity="0.8"/>
    <path d="M16,36 L28,52 L16,52 Z" fill="#ec4899" opacity="0.8"/>
    <rect x="-16" y="20" width="32" height="6" fill="#ec4899" opacity="0.3"/>
  </g>

  <!-- Sparkles -->
  <circle cx="100" cy="60" r="3" fill="#ec4899" opacity="0.4"/>
  <circle cx="140" cy="100" r="2" fill="#f472b6" opacity="0.5"/>
  <circle cx="380" cy="50" r="3" fill="#ec4899" opacity="0.4"/>
  <circle cx="340" cy="90" r="2" fill="#f472b6" opacity="0.5"/>
  <circle cx="80" cy="200" r="2" fill="#ec4899" opacity="0.3"/>
  <circle cx="400" cy="180" r="2" fill="#ec4899" opacity="0.3"/>

  <!-- Milestone markers -->
  <g transform="translate(60,130)">
    <rect width="80" height="36" rx="10" fill="white" stroke="#fce7f3" stroke-width="1.5"/>
    <text x="40" y="16" font-size="9" fill="#be185d" text-anchor="middle" font-family="system-ui" font-weight="600">Step 1</text>
    <text x="40" y="29" font-size="9" fill="#6b7280" text-anchor="middle" font-family="system-ui">Plan It</text>
  </g>
  <g transform="translate(340,130)">
    <rect width="80" height="36" rx="10" fill="white" stroke="#fce7f3" stroke-width="1.5"/>
    <text x="40" y="16" font-size="9" fill="#be185d" text-anchor="middle" font-family="system-ui" font-weight="600">Step 2</text>
    <text x="40" y="29" font-size="9" fill="#6b7280" text-anchor="middle" font-family="system-ui">Ship It</text>
  </g>

  <!-- Checklists -->
  <g transform="translate(65,190)">
    <rect width="90" height="50" rx="10" fill="white" stroke="#fce7f3" stroke-width="1.5"/>
    <text x="12" y="22" font-size="10" fill="#ec4899" font-family="system-ui">✓</text>
    <text x="24" y="22" font-size="9" fill="#374151" font-family="system-ui">Set goals</text>
    <text x="12" y="38" font-size="10" fill="#ec4899" font-family="system-ui">✓</text>
    <text x="24" y="38" font-size="9" fill="#374151" font-family="system-ui">Pick metrics</text>
  </g>
  <g transform="translate(335,190)">
    <rect width="90" height="50" rx="10" fill="white" stroke="#fce7f3" stroke-width="1.5"/>
    <text x="12" y="22" font-size="10" fill="#ec4899" font-family="system-ui">✓</text>
    <text x="24" y="22" font-size="9" fill="#374151" font-family="system-ui">Get buy-in</text>
    <text x="12" y="38" font-size="10" fill="#d1d5db" font-family="system-ui">○</text>
    <text x="24" y="38" font-size="9" fill="#374151" font-family="system-ui">Launch!</text>
  </g>

  <rect x="160" y="268" width="160" height="32" rx="16" fill="#ec4899"/>
  <text x="240" y="289" font-size="12" fill="white" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600">Your First Project</text>
