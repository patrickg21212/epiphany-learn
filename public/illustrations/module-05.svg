<svg viewBox="0 0 480 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="m5bg" x1="0" y1="0" x2="480" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
  </defs>
  <rect width="480" height="320" rx="24" fill="url(#m5bg)"/>

  <!-- Price tag -->
  <g transform="translate(190,60)">
    <rect width="100" height="120" rx="18" fill="white" stroke="#a5f3fc" stroke-width="2"/>
    <text x="50" y="50" font-size="28" fill="#0891b2" text-anchor="middle" font-family="system-ui" font-weight="800">$49</text>
    <text x="50" y="68" font-size="10" fill="#6b7280" text-anchor="middle" font-family="system-ui">/month</text>
    <text x="16" y="90" font-size="10" fill="#22d3ee" font-family="system-ui">✓</text>
    <text x="28" y="90" font-size="9" fill="#374151" font-family="system-ui">AI Features</text>
    <text x="16" y="106" font-size="10" fill="#22d3ee" font-family="system-ui">✓</text>
    <text x="28" y="106" font-size="9" fill="#374151" font-family="system-ui">API Access</text>
  </g>

  <!-- Comparison buttons -->
  <g transform="translate(120,105)">
    <rect width="52" height="36" rx="10" fill="#06b6d4" opacity="0.9"/>
    <text x="26" y="17" font-size="9" fill="white" text-anchor="middle" font-family="system-ui">Build</text>
    <text x="26" y="29" font-size="9" fill="white" text-anchor="middle" font-family="system-ui">vs Buy</text>
  </g>
  <g transform="translate(308,105)">
    <rect width="52" height="36" rx="10" fill="#0891b2" opacity="0.9"/>
    <text x="26" y="17" font-size="9" fill="white" text-anchor="middle" font-family="system-ui">ROI</text>
    <text x="26" y="29" font-size="9" fill="white" text-anchor="middle" font-family="system-ui">Check</text>
  </g>

  <!-- Shopping cart -->
  <g transform="translate(200,190)">
    <rect width="80" height="52" rx="12" fill="white" stroke="#a5f3fc" stroke-width="1.5"/>
    <path d="M18,18 L22,18 L30,40 L62,40 L66,24 L28,24" stroke="#06b6d4" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="36" cy="46" r="3" fill="#06b6d4"/>
    <circle cx="56" cy="46" r="3" fill="#06b6d4"/>
  </g>

  <g transform="translate(60,160)">
    <rect width="70" height="32" rx="8" fill="white" stroke="#a5f3fc" stroke-width="1"/>
    <text x="35" y="21" font-size="10" fill="#0891b2" text-anchor="middle" font-family="system-ui" font-weight="600">📋 Eval</text>
  </g>
  <g transform="translate(354,170)">
    <rect width="80" height="32" rx="8" fill="white" stroke="#a5f3fc" stroke-width="1"/>
    <text x="40" y="21" font-size="10" fill="#0891b2" text-anchor="middle" font-family="system-ui" font-weight="600">📊 Compare</text>
  </g>

  <rect x="175" y="268" width="130" height="32" rx="16" fill="#06b6d4"/>
  <text x="240" y="289" font-size="12" fill="white" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600">Buying Smart</text>
</svg>
