<svg viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="heroAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#heroBg)"/>

  <!-- Subtle grid -->
  <pattern id="heroGrid" width="48" height="48" patternUnits="userSpaceOnUse">
    <circle cx="24" cy="24" r="1" fill="#6366f1" opacity="0.15"/>
  </pattern>
  <rect width="800" height="500" fill="url(#heroGrid)"/>

  <!-- Central orbit ring -->
  <circle cx="400" cy="240" r="120" fill="none" stroke="url(#heroAccent)" stroke-width="1.5" opacity="0.2"/>
  <circle cx="400" cy="240" r="80" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.15"/>
  <circle cx="400" cy="240" r="160" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1"/>

  <!-- Central brain node -->
  <circle cx="400" cy="240" r="48" fill="url(#nodeGrad)" opacity="0.15"/>
  <circle cx="400" cy="240" r="36" fill="url(#nodeGrad)"/>
  <!-- Brain icon simplified -->
  <g transform="translate(400,240)" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round">
    <path d="M-6,-18 C-14,-18 -20,-12 -20,-4 C-22,-3 -24,0 -24,4 C-24,8 -22,12 -18,14 L-18,18 L-2,18 L-2,14"/>
    <path d="M6,-18 C14,-18 20,-12 20,-4 C22,-3 24,0 24,4 C24,8 22,12 18,14 L18,18 L2,18 L2,14"/>
    <line x1="0" y1="-18" x2="0" y2="18" stroke-dasharray="3,3" opacity="0.5"/>
  </g>

  <!-- Module nodes orbiting -->
  <!-- Module 1: Blue -->
  <circle cx="320" cy="140" r="24" fill="#3b82f6" opacity="0.9"/>
  <text x="320" y="145" font-size="20" text-anchor="middle" font-family="system-ui">🧠</text>
  <line x1="340" y1="156" x2="372" y2="212" stroke="#3b82f6" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>

  <!-- Module 2: Purple -->
  <circle cx="480" cy="140" r="24" fill="#8b5cf6" opacity="0.9"/>
  <text x="480" y="145" font-size="20" text-anchor="middle" font-family="system-ui">⌨️</text>
  <line x1="460" y1="156" x2="428" y2="212" stroke="#8b5cf6" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>

  <!-- Module 3: Green -->
  <circle cx="540" cy="240" r="24" fill="#22c55e" opacity="0.9"/>
  <text x="540" y="245" font-size="20" text-anchor="middle" font-family="system-ui">📅</text>
  <line x1="516" y1="240" x2="436" y2="240" stroke="#22c55e" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>

  <!-- Module 4: Orange -->
  <circle cx="480" cy="340" r="24" fill="#f97316" opacity="0.9"/>
  <text x="480" y="345" font-size="20" text-anchor="middle" font-family="system-ui">🛡️</text>
  <line x1="460" y1="324" x2="428" y2="268" stroke="#f97316" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>

  <!-- Module 5: Cyan -->
  <circle cx="320" cy="340" r="24" fill="#06b6d4" opacity="0.9"/>
  <text x="320" y="345" font-size="20" text-anchor="middle" font-family="system-ui">💲</text>
  <line x1="340" y1="324" x2="372" y2="268" stroke="#06b6d4" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>

  <!-- Module 6: Pink -->
  <circle cx="260" cy="240" r="24" fill="#ec4899" opacity="0.9"/>
  <text x="260" y="245" font-size="20" text-anchor="middle" font-family="system-ui">🚀</text>
  <line x1="284" y1="240" x2="364" y2="240" stroke="#ec4899" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>

  <!-- XP badge -->
  <rect x="345" y="395" width="110" height="36" rx="18" fill="#8b5cf6" opacity="0.85"/>
  <text x="400" y="418" font-size="13" fill="white" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700">+1600 XP Total</text>

  <!-- Free badge -->
  <rect x="368" y="155" width="64" height="28" rx="14" fill="#22c55e" opacity="0.85"/>
  <text x="400" y="174" font-size="12" fill="white" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700">100% Free</text>

  <!-- Sparkle dots -->
  <circle cx="180" cy="120" r="2" fill="#a78bfa" opacity="0.5"/>
  <circle cx="620" cy="130" r="2" fill="#60a5fa" opacity="0.5"/>
  <circle cx="160" cy="340" r="2" fill="#22d3ee" opacity="0.4"/>
  <circle cx="640" cy="350" r="2" fill="#f472b6" opacity="0.4"/>
  <circle cx="200" cy="230" r="1.5" fill="#a78bfa" opacity="0.3"/>
  <circle cx="600" cy="230" r="1.5" fill="#a78bfa" opacity="0.3"/>
</svg>
